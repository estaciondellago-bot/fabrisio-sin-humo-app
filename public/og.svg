<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(250,204,21,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="rgba(250,204,21,0.18)"/>
      <stop offset="100%" stop-color="rgba(250,204,21,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0b"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Flame icon big (lucide Flame path, scaled to fit 170x170) -->
  <g transform="translate(120, 230)">
    <rect width="170" height="170" rx="36" fill="#facc15"/>
    <g transform="translate(25 25) scale(5)">
      <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" fill="none" stroke="#0a0a0b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Text -->
  <text x="340" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="-2">Fabrisio sin Humo</text>
  <text x="340" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="#facc15" letter-spacing="-1">Estrategia real. Sin chamuyo.</text>
  <text x="340" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#a1a1aa">Caja de herramientas profesional para diagnosticar,</text>
  <text x="340" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#a1a1aa">estrategizar y escalar tu negocio.</text>

  <!-- Bottom bar -->
  <line x1="120" y1="560" x2="1080" y2="560" stroke="rgba(250,204,21,0.2)" stroke-width="1"/>
  <text x="120" y="595" font-family="-apple-system, BlinkMacSystemFont, monospace" font-size="20" font-weight="600" fill="#facc15" letter-spacing="2">FABRISIOSINHUMO.COM</text>
  <text x="1080" y="595" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="500" fill="#71717a" text-anchor="end">Powered by Claude</text>
</svg>
